name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'          # fires on tags like v1.0.0, v1.2.3, etc.
  workflow_dispatch:       # allows a manual run from the GitHub Actions UI

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Package ONLY the plugin subfolder into a ZIP named SemanticSegEval.zip
      #    The ZIP must contain SemanticSegEval/ at its root so QGIS extracts it
      #    into a folder named exactly "SemanticSegEval" (no version suffix).
      - name: Build SemanticSegEval.zip
        run: zip -r SemanticSegEval.zip SemanticSegEval/

      # 3. On a version tag: create a GitHub Release and upload the ZIP
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Semantic Segmentation Evaluator ${{ github.ref_name }}"
          body: |
            ## Semantic Segmentation Evaluator ${{ github.ref_name }}

            QGIS 3 plugin for evaluating binary semantic segmentation masks
            against a Ground Truth raster.

            ### Install
            1. Download **`SemanticSegEval.zip`** from the Assets section below
               (not the "Source code" archives — those will not work).
            2. In QGIS: **Plugins → Manage and Install Plugins → Install from ZIP**.
            3. Browse to the downloaded `SemanticSegEval.zip` and click **Install Plugin**.

            See [README.md](https://github.com/${{ github.repository }}/blob/main/README.md)
            for full installation and usage instructions including the opencv-python
            dependency that must be installed before first use.

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)
            for what changed in this version.
          files: SemanticSegEval.zip
          draft: false
          prerelease: false
